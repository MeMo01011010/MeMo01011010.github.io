<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ | Top Notch Roofing</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --primary-blue: #0a1a27;
            --darker-blue: #061018;
            --accent-gold: #F4A261;
            --accent-hover: #e78c43;
            --text-light: #f1f5f9;
            --text-gray: #cbd5e1;
            --header-height: 150px; /* UPDATED SIZE */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--primary-blue);
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        a { text-decoration: none; color: inherit; }

        /* --- HEADER --- */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 5%;
            background-color: rgba(10, 26, 39, 0.98);
            position: fixed;
            width: 100%;
            height: var(--header-height);
            top: 0;
            z-index: 1005; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-toggle {
            cursor: pointer;
            width: 35px;
            height: 25px;
            position: relative;
        }

        .bar {
            display: block;
            width: 100%;
            height: 3px;
            background-color: white;
            position: absolute;
            left: 0;
            transition: all 0.4s ease-in-out;
            border-radius: 2px;
        }
        .bar:nth-child(1) { top: 0; }
        .bar:nth-child(2) { top: 11px; }
        .bar:nth-child(3) { top: 22px; }
        
        .menu-toggle.active .bar:nth-child(1) { top: 11px; transform: rotate(45deg); background-color: var(--accent-gold); }
        .menu-toggle.active .bar:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .menu-toggle.active .bar:nth-child(3) { top: 11px; transform: rotate(-45deg); background-color: var(--accent-gold); }

        .logo-container { text-align: center; }
        .logo-container img {
            height: 125px; /* UPDATED SIZE */
            width: auto;
            display: block;
        }

        .header-right { text-align: right; }
        .cta-small {
            background-color: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 10px 20px;
            font-weight: 700;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .cta-small:hover { background-color: var(--accent-gold); color: var(--primary-blue); }

        /* --- MENU OVERLAY --- */
        .nav-overlay {
            height: 100vh;
            width: 100%;
            position: fixed;
            z-index: 1001; 
            top: 0;
            left: 0;
            background-color: var(--darker-blue);
            transition: 0.5s ease;
            opacity: 0;
            visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .nav-overlay.open { opacity: 1; visibility: visible; pointer-events: auto; }
        .nav-content { text-align: center; }
        .nav-content a {
            padding: 15px;
            text-decoration: none;
            font-size: 3rem;
            color: #818181;
            display: block;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
        }
        .nav-content a:hover { color: var(--accent-gold); transform: scale(1.05); }

        /* --- FAQ SECTION --- */
        .page-wrapper {
            padding-top: calc(var(--header-height) + 60px);
            padding-bottom: 80px;
            padding-left: 5%;
            padding-right: 5%;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .faq-header { text-align: center; margin-bottom: 50px; }
        .faq-header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .faq-header p { color: var(--text-gray); }

        /* ACCORDION STYLES */
        .accordion-item {
            background-color: var(--darker-blue);
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 15px;
            border-radius: 6px;
            overflow: hidden;
        }

        .accordion-header {
            width: 100%;
            padding: 20px 25px;
            text-align: left;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s;
        }
        
        .accordion-header:hover { background-color: rgba(255,255,255,0.05); }
        .accordion-header.active { color: var(--accent-gold); }
        
        /* The "+" Icon */
        .icon { font-size: 1.5rem; transition: 0.3s; }
        .accordion-header.active .icon { transform: rotate(45deg); }

        .accordion-content {
            padding: 0 25px;
            max-height: 0;
            overflow: hidden;
            background-color: rgba(0,0,0,0.2);
            transition: max-height 0.3s ease-out, padding 0.3s ease;
        }
        
        .accordion-content p {
            color: var(--text-gray);
            margin-bottom: 20px;
            line-height: 1.7;
        }
        
        /* Reveal content class */
        .accordion-content.show {
            padding: 20px 25px;
            max-height: 500px; /* Arbitrary large height */
        }

        footer { background-color: black; padding: 50px 5%; text-align: center; color: var(--text-gray); font-size: 0.9rem; margin-top: auto; }

        @media (max-width: 768px) {
            header { display: flex; justify-content: center; position: relative; padding: 0 20px; height: 100px; } /* Updated Height */
            .menu-left { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); }
            .logo-container img { height: 70px; } /* Updated Size */
            .header-right { display: none; }
            .faq-header h1 { font-size: 2rem; }
            .nav-content a { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- OVERLAY MENU -->
    <div id="myNav" class="nav-overlay">
        <div class="nav-content">
            <a href="index.html" onclick="toggleMenu()">Home</a>
            <a href="services.html" onclick="toggleMenu()">Services</a>
            <a href="faq.html" onclick="toggleMenu()">FAQ</a>
            <a href="about.html" onclick="toggleMenu()">About Us</a>
            <a href="quote.html" onclick="toggleMenu()">Get Estimate</a> 
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div class="menu-left">
            <div class="menu-toggle" onclick="toggleMenu()">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
        <div class="logo-container">
            <img src="Top_notch_transparent_white_cropped.png" alt="Company Logo">
        </div>
        <div class="header-right">
            <a href="tel:5555555555" class="cta-small">Call Us</a>
        </div>
    </header>

    <div class="page-wrapper">
        <div class="faq-header">
            <h1>Frequently Asked Questions</h1>
            <p>Answers to common questions about our roofing services.</p>
        </div>

        <!-- FAQ ITEM 1 -->
        <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                Do you offer free estimates?
                <span class="icon">+</span>
            </button>
            <div class="accordion-content">
                <p>Placeholder</p>
            </div>
        </div>

        <!-- FAQ ITEM 2 -->
        <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                Are you licensed and insured?
                <span class="icon">+</span>
            </button>
            <div class="accordion-content">
                <p>Placeholder</p>
            </div>
        </div>

        <!-- FAQ ITEM 3 -->
        <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                How long does a roof replacement take?
                <span class="icon">+</span>
            </button>
            <div class="accordion-content">
                <p>Placeholder</p>
            </div>
        </div>

        <!-- FAQ ITEM 4 -->
        <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                What types of roofing materials do you install?
                <span class="icon">+</span>
            </button>
            <div class="accordion-content">
                <p>Placeholder</p>
            </div>
        </div>

        <!-- FAQ ITEM 5 -->
        <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                What do I do if my roof leaks during a storm?
                <span class="icon">+</span>
            </button>
            <div class="accordion-content">
                <p>Placeholder</p>
            </div>
        </div>

    </div>

    <footer><p>&copy; 2025 Top Notch Roofing. All Rights Reserved.</p><p>CA LIC. 1147189</p></footer>

    <script>
        // MENU TOGGLE
        function toggleMenu() {
            var overlay = document.getElementById("myNav");
            var hamburger = document.querySelector(".menu-toggle");
            overlay.classList.toggle("open");
            hamburger.classList.toggle("active");
        }

        // ACCORDION TOGGLE
        function toggleAccordion(element) {
            // Toggle Active Class on Header (for color/icon rotation)
            element.classList.toggle("active");

            // Toggle Content Visibility
            var content = element.nextElementSibling;
            content.classList.toggle("show");
        }
    </script>
</body>
</html>
