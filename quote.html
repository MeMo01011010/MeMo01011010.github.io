<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Free Quote | Top Notch Roofing</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --primary-blue: #0a1a27;
            --darker-blue: #061018;
            --accent-gold: #F4A261;
            --accent-hover: #e78c43;
            --text-light: #f1f5f9;
            --header-height: 110px; /* MATCHING HOMEPAGE HEIGHT */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--primary-blue);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER (MATCHING HOMEPAGE) --- */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Exact same layout */
            align-items: center;
            padding: 0 5%;
            background-color: rgba(10, 26, 39, 0.98);
            position: fixed;
            width: 100%;
            height: var(--header-height);
            top: 0;
            z-index: 1005;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* LEFT SIDE (Back Button) */
        .header-left a {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: white;
            transition: color 0.3s;
        }
        .header-left a:hover { color: var(--accent-gold); }

        /* CENTER (Big Logo) */
        .logo-container {
            text-align: center;
        }
        
        .logo-container img {
            height: 85px; /* MATCHING HOMEPAGE SIZE */
            width: auto;
            display: block;
        }

        /* RIGHT SIDE (Empty for balance) */
        .header-right { text-align: right; }

        /* --- FORM CONTAINER --- */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Added padding-top to account for the fixed header */
            padding: calc(var(--header-height) + 40px) 20px 40px; 
            background: linear-gradient(135deg, rgba(10, 26, 39, 0.9) 0%, rgba(10, 26, 39, 0.8) 100%), url('https://images.unsplash.com/photo-1632759145351-1d592919f522?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Parallax feel */
        }

        .form-wrapper {
            background-color: white;
            color: var(--primary-blue);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-top: 5px solid var(--accent-gold);
            animation: slideUp 0.8s ease;
        }

        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 2rem; margin-bottom: 10px; }
        .form-header p { color: #666; }

        /* Form Fields */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(244, 162, 97, 0.2);
        }

        textarea { resize: vertical; height: 100px; }

        /* Submit Button */
        .submit-btn {
            background-color: var(--primary-blue);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover { background-color: var(--accent-gold); color: var(--primary-blue); }
        
        /* Mobile */
        @media (max-width: 768px) {
            header { padding: 0 20px; height: 80px; }
            .logo-container img { height: 50px; } /* Shrinks on mobile just like homepage */
            .form-wrapper { padding: 30px 20px; }
            .form-header h1 { font-size: 1.5rem; }
            .header-left a { font-size: 0.8rem; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Header (Identical structure to Home) -->
    <header>
        <div class="header-left">
            <a href="index.html">← Back</a>
        </div>

        <div class="logo-container">
            <!-- Ensure your logo.png is in the same folder -->
            <img src="top_notch_logo_cropped.JPG" alt="Company Logo">
        </div>

        <div class="header-right">
            <!-- Empty for balance, or could add phone number -->
        </div>
    </header>

    <div class="container">
        <div class="form-wrapper">
            <div class="form-header">
                <h1>Get Your Free Estimate</h1>
                <p>Fill out the form below and we'll get back to you within 24 hours.</p>
            </div>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" required>
                </div>

                <div class="form-group">
                    <label for="service">Service Needed</label>
                    <select id="service" name="service">
                        <option value="replacement">Roof Replacement</option>
                        <option value="repair">Repair / Leak</option>
                        <option value="inspection">Free Estimate</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Project Details (Optional)</label>
                    <textarea id="message" name="message" placeholder="Tell us briefly about your roof issues..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Request Quote</button>
            </form>
        </div>
    </div>

</body>
</html>
