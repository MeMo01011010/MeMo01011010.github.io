<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Free Quote | Top Notch Roofing</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --primary-blue: #0a1a27;
            --darker-blue: #061018;
            --accent-gold: #F4A261;
            --accent-hover: #e78c43;
            --text-light: #f1f5f9;
            --header-height: 150px; 
        }

        html {
            overflow-y: scroll; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--primary-blue);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 5%;
            background-color: rgba(10, 26, 39, 0.98);
            position: fixed;
            width: 100%;
            height: var(--header-height);
            top: 0;
            z-index: 1005; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* MENU TOGGLE */
        .menu-toggle {
            cursor: pointer;
            width: 35px;
            height: 25px;
            position: relative;
        }

        .bar {
            display: block;
            width: 100%;
            height: 3px;
            background-color: white;
            position: absolute;
            left: 0;
            transition: all 0.4s ease-in-out;
            border-radius: 2px;
        }
        .bar:nth-child(1) { top: 0; }
        .bar:nth-child(2) { top: 11px; }
        .bar:nth-child(3) { top: 22px; }
        
        .menu-toggle.active .bar:nth-child(1) { top: 11px; transform: rotate(45deg); background-color: var(--accent-gold); }
        .menu-toggle.active .bar:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .menu-toggle.active .bar:nth-child(3) { top: 11px; transform: rotate(-45deg); background-color: var(--accent-gold); }

        /* LOGO */
        .logo-container { text-align: center; }
        .logo-container img {
            height: 125px; 
            width: auto;
            display: block;
        }

        /* RIGHT CTA */
        .header-right { text-align: right; }
        .cta-small {
            background-color: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 10px 20px;
            font-weight: 700;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .cta-small:hover { background-color: var(--accent-gold); color: var(--primary-blue); }

        /* --- MENU OVERLAY --- */
        .nav-overlay {
            height: 100vh;
            width: 100%;
            position: fixed;
            z-index: 1001; 
            top: 0;
            left: 0;
            background-color: var(--darker-blue);
            transition: 0.5s ease;
            opacity: 0;
            visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .nav-overlay.open { opacity: 1; visibility: visible; pointer-events: auto; }
        .nav-content { text-align: center; }
        .nav-content a {
            padding: 15px;
            text-decoration: none;
            font-size: 3rem;
            color: #818181;
            display: block;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
        }
        .nav-content a:hover { color: var(--accent-gold); transform: scale(1.05); }

        /* --- FORM CONTAINER --- */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--header-height) + 40px) 20px 40px; 
            background: linear-gradient(135deg, rgba(10, 26, 39, 0.9) 0%, rgba(10, 26, 39, 0.8) 100%), url('https://images.unsplash.com/photo-1632759145351-1d592919f522?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .form-wrapper {
            background-color: white;
            color: var(--primary-blue);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-top: 5px solid var(--accent-gold);
            animation: slideUp 0.8s ease;
        }

        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 2rem; margin-bottom: 10px; }
        .form-header p { color: #666; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        
        /* UPDATED: Added :not([type="radio"]) so radio buttons don't get full width */
        input:not([type="radio"]), select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(244, 162, 97, 0.2);
        }

        /* NEW STYLES FOR RADIO BUTTONS */
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .radio-label {
            display: flex;
            align-items: center;
            font-weight: 400; /* Regular weight for options */
            cursor: pointer;
            margin-bottom: 0;
        }
        .radio-label input {
            margin-right: 8px;
            width: auto;
            accent-color: var(--accent-gold);
        }

        textarea { resize: vertical; height: 100px; }

               /* --- FOOTER --- */
        footer { 
            background-color: black; 
            padding: 40px 5%; 
            color: var(--text-gray); 
            font-size: 0.9rem; 
            margin-top: auto;
        }
        .footer-content {
            display: flex;
            justify-content: center;
            gap: 150px;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        .footer-text { text-align: left; }
        .footer-text p { margin-bottom: 5px; }
        .footer-socials { display: flex; gap: 20px; }
        .footer-socials a { 
            color: var(--text-gray); 
            transition: color 0.3s; 
            display: flex; 
            align-items: center; 
        }
        .footer-socials a:hover { color: var(--accent-gold); }
        .footer-socials svg { width: 28px; height: 28px; }

        .submit-btn {
            background-color: var(--primary-blue);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover { background-color: var(--accent-gold); color: var(--primary-blue); }
        
        /* Mobile */
@media (max-width: 768px) {
            header { 
                display: flex; 
                justify-content: center; 
                position: relative;
                padding: 0 20px; 
                height: 80px; 
            }
            .menu-left {
                position: absolute;
                left: 20px; 
                top: 50%;
                transform: translateY(-50%); 
            }
            .logo-container img { height: 70px; }
            
            /* UPDATED: Displays the button and positions it on the right */
            .header-right { 
                display: block;
                position: absolute;
                right: 20px;
                top: 50%;
                transform: translateY(-50%);
            } 
            
            /* OPTIONAL: Slightly reduces button size to fit better on small screens */
            .cta-small {
                padding: 8px 12px;
                font-size: 0.75rem;
            }

            .stats {
                flex-direction: column; 
                gap: 50px; 
            }
            .hero h1 { font-size: 2.5rem; }
            .nav-content a { font-size: 2rem; }
            .footer-content { flex-direction: column; text-align: center; gap: 20px; }
            .footer-text { text-align: center; }
        }
    </style>
</head>
<body>

    <!-- OVERLAY MENU -->
    <div id="myNav" class="nav-overlay">
        <div class="nav-content">
            <a href="index.html" onclick="toggleMenu()">Home</a>
            <a href="services.html" onclick="toggleMenu()">Services</a>
            <a href="gallery.html" onclick="toggleMenu()">Project Gallery</a>
            <a href="faq.html" onclick="toggleMenu()">FAQ</a>
            <a href="about.html" onclick="toggleMenu()">About Us</a>
            <a href="quote.html" onclick="toggleMenu()">Get Estimate</a> 
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="menu-left">
            <div class="menu-toggle" onclick="toggleMenu()">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>

        <div class="logo-container">
            <a href="index.html" title="Home">
            <!-- Ensure this image path is correct on your server -->
            <img src="Top_notch_transparent_white_cropped.png" alt="Company Logo">
            </a>
        </div>

        <div class="header-right">
            <a href="tel:+15302768423" class="cta-small">Call Us</a>
        </div>
    </header>

    <div class="container">
        <div class="form-wrapper">
            <div class="form-header">
                <h1>Get Your Free Estimate</h1>
                <p>Fill out the form below and we'll get back to you within 24 hours.</p>
            </div>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" required>
                </div>

                <!-- NEW EMAIL FIELD -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <!-- NEW CONTACT PREFERENCE RADIO BUTTONS -->
                <div class="form-group">
                    <label>Preferred Contact Method</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="contact_method" value="phone" checked> Phone
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="contact_method" value="email"> Email
                        </label>
                    </div>
                </div>

                <!-- NEW ADDRESS FIELD -->
                <div class="form-group">
                    <label for="address">Property Address</label>
                    <input type="text" id="address" name="address" placeholder="1234 Main St, City, Zip" required>
                </div>

                <div class="form-group">
                    <label for="service">Service Needed</label>
                    <select id="service" name="service">
                        <option value="replacement">Roof Replacement</option>
                        <option value="repair">Repair / Leak</option>
                        <option value="inspection">Free Estimate</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Project Details (Optional)</label>
                    <textarea id="message" name="message" placeholder="Tell us briefly about your roof issues..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Request Quote</button>
            </form>
        </div>
    </div>
    <footer>
        <div class="footer-content">
            <div class="footer-text">
                <p>&copy; 2025 Top Notch Roofing. All Rights Reserved.</p>
                <p>CA LIC. 1147189</p>
            </div>
            <div class="footer-socials">
                <a href="https://www.facebook.com/topnotchredding?mibextid=wwXIfr&mibextid=wwXIfr" target="_blank" aria-label="Facebook">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                    </svg>
                </a>
                <a href="https://www.instagram.com/topnotchredding?igsh=NTc4MTIwNjQ2YQ==" target="_blank" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
            </div>
        </div>
    </footer>
    <script>
        function toggleMenu() {
            var overlay = document.getElementById("myNav");
            var hamburger = document.querySelector(".menu-toggle");
            overlay.classList.toggle("open");
            hamburger.classList.toggle("active");
        }
    </script>
</body>
</html>
